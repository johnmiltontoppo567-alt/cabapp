<!DOCTYPE html>
<html>
<head>
    <title>CabApp - {% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'ride_list' %}">
                🚕 CabApp
            </a>

            <div class="navbar-nav ms-auto">
                {% if request.user.is_authenticated %}
                    <span class="navbar-text text-white me-3">
                        👤 {{ request.user.username }}
                    </span>

                    {% if request.user.userprofile.role == 'driver' %}
                        <a class="nav-link text-white" 
                           href="{% url 'driver_dashboard' %}">
                           Dashboard
                        </a>
                    {% else %}
                        <a class="nav-link text-white" 
                           href="{% url 'request_ride' %}">
                           Request Ride
                        </a>
                    {% endif %}

                    <form method="POST" action="{% url 'logout' %}" 
                          class="d-inline">
                        {% csrf_token %}
                        <button class="btn btn-outline-light btn-sm ms-2" 
                                type="submit">
                            Logout
                        </button>
                    </form>

                {% else %}
                    <a class="nav-link text-white" 
                       href="{% url 'login' %}">Login</a>
                    <a class="nav-link text-white" 
                       href="{% url 'register' %}">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

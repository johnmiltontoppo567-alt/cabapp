<!DOCTYPE html>
<html>
<head>
    <title>CabApp - {% block title %}{% endblock %}</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav>
        <a href="{% url 'ride_list' %}">Home</a>

        {% if request.user.is_authenticated %}
            <span>Welcome, {{ request.user.username }}!</span>

            {% if request.user.userprofile.role == 'driver' %}
                <a href="{% url 'driver_dashboard' %}">Driver Dashboard</a>
            {% else %}
                <a href="{% url 'request_ride' %}">Request Ride</a>
            {% endif %}

            <form method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>

        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>

    <!-- Page Content -->
    <div>
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
<!-- ```

**New concept — `request.user.is_authenticated`:**
```
request.user.is_authenticated = True  → user is logged in
request.user.is_authenticated = False → user is logged out
```

Used to show different navbar items based on login status:
```
Logged in  → show username, logout button
Logged out → show login, register links -->

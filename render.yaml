services:
  - type: web
    name: cabapp
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "daphne cabapp.asgi:application --port $PORT --bind 0.0.0.0"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cabapp-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.1"

databases:
  - name: cabapp-db
    plan: free

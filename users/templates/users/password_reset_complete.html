{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete — Kokrajhar Cab{% endblock %}

{% block extra_head %}
<style>
    body { background: #020617; }
    .auth-wrapper {
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
    }
    .auth-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 16px; display: block; }
    .auth-title { font-size: 1.5rem; font-weight: 700; color: white; margin-bottom: 12px; }
    .auth-subtitle { color: #94A3B8; font-size: 0.9375rem; line-height: 1.5; margin-bottom: 32px; }
    .btn-submit {
        display: inline-block; width: 100%; padding: 14px; background: #FBD304; color: #020617; border: none; border-radius: 12px;
        font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; text-decoration: none; box-sizing: border-box;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(251, 211, 4, 0.4); }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <span class="icon">✅</span>
        <h1 class="auth-title">Password Updated!</h1>
        <p class="auth-subtitle">Your password has been set. You may go ahead and log in now.</p>
        <a href="{% url 'login' %}" class="btn-submit">Log in to your account</a>
    </div>
</div>
{% endblock %}

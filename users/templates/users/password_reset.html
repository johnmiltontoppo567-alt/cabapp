{% extends 'base.html' %}
{% load static %}

{% block title %}Reset Password — Kokrajhar Cab{% endblock %}

{% block extra_head %}
<style>
    body { background: #020617; }

    .auth-wrapper {
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        position: relative;
    }

    .auth-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .auth-title { font-size: 1.5rem; font-weight: 700; color: white; margin-bottom: 8px; text-align: center; }
    .auth-subtitle { color: #94A3B8; font-size: 0.875rem; text-align: center; margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 0.7rem; font-weight: 700; color: #64748B; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .form-input { 
        width: 100%; padding: 12px 16px; background: rgba(15, 23, 42, 0.6); border: 2px solid rgba(255, 255, 255, 0.05); 
        border-radius: 12px; color: white; box-sizing: border-box; 
    }
    .form-input:focus { outline: none; border-color: #FBD304; }

    .btn-submit {
        width: 100%; padding: 14px; background: #FBD304; color: #020617; border: none; border-radius: 12px;
        font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 8px; text-transform: uppercase;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(251, 211, 4, 0.4); }

    .back-link { display: block; text-align: center; margin-top: 24px; color: #94A3B8; text-decoration: none; font-size: 0.875rem; }
    .back-link:hover { color: white; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">Enter your email address to receive a password reset link.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="{{ form.email.id_for_label }}">Email Address</label>
                <input type="email" name="{{ form.email.html_name }}" id="{{ form.email.id_for_label }}" 
                       class="form-input" placeholder="name@example.com" required>
            </div>
            <button type="submit" class="btn-submit">Send Reset Link</button>
        </form>

        <a href="{% url 'login' %}" class="back-link">← Back to Login</a>
    </div>
</div>
{% endblock %}
